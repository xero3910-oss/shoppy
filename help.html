<!DOCTYPE html>
<html>
<head>
  <title>Help - SHOPPY</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
    }

    header {
      background: green;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .section {
      background: white;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
      cursor: pointer;
    }

    .section:hover {
      background: #eee;
    }
  </style>
</head>

<body>

<header>
  <h2>Help & Support 💬</h2>
</header>

<div class="section" onclick="chatSupport()">
  💬 Chat with Support
</div>

<div class="section" onclick="reportProblem()">
  ⚠️ Report a Problem
</div>

<div class="section" onclick="requestRefund()">
  💸 Request Refund
</div>

<script>

function chatSupport() {
  alert("Support chat coming soon 💬");
}

function reportProblem() {
  let issue = prompt("Describe your problem:");
  if (issue) {
    alert("Problem reported: " + issue);
  }
}

function requestRefund() {
  let reason = prompt("Why do you want a refund?");
  if (reason) {
    alert("Refund request sent: " + reason);
  }
}

</script>

</body>
</html>
