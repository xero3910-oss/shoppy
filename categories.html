<!DOCTYPE html>
<html>
<head>
  <title>Categories - SHOPPY</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
    }

    header {
      background: green;
      color: white;
      padding: 10px;
      text-align: center;
    }

    .category-list {
      background: white;
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
    }

    .category {
      padding: 15px;
      border-bottom: 1px solid #ccc;
      cursor: pointer;
    }

    .category:hover {
      background: #eee;
    }

    .filters {
      margin: 10px;
      background: white;
      padding: 10px;
      border-radius: 10px;
    }

    select {
      padding: 10px;
      width: 100%;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<header>
  <h2>Categories</h2>
</header>

<!-- FILTERS -->
<div class="filters">
  <h4>Filter</h4>

  <label>Price:</label>
  <select>
    <option>All</option>
    <option>Below 500</option>
    <option>500 - 2000</option>
    <option>Above 2000</option>
  </select>

  <label>Brand:</label>
  <select>
    <option>All</option>
    <option>Samsung</option>
    <option>Nike</option>
    <option>Generic</option>
  </select>
</div>

<!-- CATEGORY LIST -->
<div class="category-list">

  <div class="category" onclick="openCategory('electronics')">
    💻 Electronics
  </div>

  <div class="category" onclick="openCategory('fashion')">
    👕 Fashion
  </div>

  <div class="category" onclick="openCategory('beauty')">
    💄 Health & Beauty
  </div>

  <div class="category" onclick="openCategory('groceries')">
    🛒 Groceries
  </div>

</div>

<script>
function openCategory(category) {
  alert("Opening " + category + " products...");
  // Later we will load real products here
}
</script>

</body>
</html>
