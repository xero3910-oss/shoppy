<!DOCTYPE html>
<html>
<head>
  <title>SHOPPY Home</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: green;
      color: white;
      padding: 10px;
      text-align: center;
    }

    .search-bar {
      display: flex;
      padding: 10px;
      background: white;
    }

    .search-bar input {
      flex: 1;
      padding: 10px;
    }

    .search-bar button {
      padding: 10px;
      background: green;
      color: white;
      border: none;
    }

    .categories {
      display: flex;
      justify-content: space-around;
      background: white;
      padding: 10px;
    }

    .category {
      text-align: center;
      font-size: 14px;
    }

    .banner {
      margin: 10px;
      padding: 30px;
      background: orange;
      color: white;
      text-align: center;
      border-radius: 10px;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: white;
      padding: 10px;
      border-top: 1px solid #ccc;
    }

    .bottom-nav div {
      text-align: center;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header>
  <h2>SHOPPY 🇰🇪</h2>
</header>
<header>
  <h2>SHOPPY 🇰🇪</h2>
  <span onclick="openNotifications()" style="float:right; cursor:pointer;">🔔</span>
</header>

<!-- SEARCH -->
<div class="search-bar">
  <input type="text" placeholder="Search products...">
<button onclick="goSearch()">Search</button>
</div>

<!-- CATEGORIES -->
<div class="categories">
  <div class="category">📱 Phones</div>
  <div class="category">💻 Electronics</div>
  <div class="category">👕 Fashion</div>
  <div class="category">🛒 Supermarket</div>
</div>

<!-- BANNERS -->
<div class="banner">🔥 Flash Sale - Up to 50% OFF</div>
<div class="banner">🎯 Best Deals Today</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
<div onclick="goHome()">🏠 Home</div>
<div onclick="openCategories()">📂 Categories</div>
<div onclick="openCart()">🛒 Cart</div>
<div onclick="openProfile()">👤 Account</div>
<div onclick="openWishlist()">❤️ Wishlist</div>
</div>
<script>
function goHome() {
  window.location.href = "/home.html";
}
</script>
<script>
function openWishlist() {
  window.location.href = "/wishlist.html";
}
</script>
<script>
function openNotifications() {
  window.location.href = "/notifications.html";
}
</script>
<script>
function openProfile() {
  window.location.href = "/profile.html";
}
</script>
<script>
function goSearch() {
  window.location.href = "/search.html";
}
</script>
<script>
function openCart() {
  window.location.href = "/cart.html";
}
</script>
<script>
function openOrders() {
  window.location.href = "/orders.html";
}
</script>
<script>
function openCategories() {
  window.location.href = "/categories.html";
}
</script>
</body>
</html>
