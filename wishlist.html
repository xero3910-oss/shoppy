<!DOCTYPE html>
<html>
<head>
  <title>Wishlist - SHOPPY</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
    }

    header {
      background: green;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .item {
      background: white;
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
    }

    button {
      margin-top: 5px;
      padding: 8px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .cart { background: green; color: white; }
    .remove { background: red; color: white; }
  </style>
</head>

<body>

<header>
  <h2>My Wishlist ❤️</h2>
</header>

<div id="wishlist"></div>

<script>

let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

// DISPLAY
function showWishlist() {
  const container = document.getElementById("wishlist");
  container.innerHTML = "";

  if (wishlist.length === 0) {
    container.innerHTML = "<p style='text-align:center;'>No items yet</p>";
    return;
  }

  wishlist.forEach((item, index) => {
    container.innerHTML += `
      <div class="item">
        <h3>${item.name}</h3>
        <p>KSh ${item.price}</p>

        <button class="cart" onclick="moveToCart(${index})">
          🛒 Move to Cart
        </button>

        <button class="remove" onclick="removeItem(${index})">
          ❌ Remove
        </button>
      </div>
    `;
  });
}

// MOVE TO CART
function moveToCart(index) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push({
    name: wishlist[index].name,
    price: wishlist[index].price,
    qty: 1
  });

  localStorage.setItem("cart", JSON.stringify(cart));

  wishlist.splice(index, 1);
  saveWishlist();
}

// REMOVE
function removeItem(index) {
  wishlist.splice(index, 1);
  saveWishlist();
}

function saveWishlist() {
  localStorage.setItem("wishlist", JSON.stringify(wishlist));
  showWishlist();
}

showWishlist();

</script>

</body>
</html>
