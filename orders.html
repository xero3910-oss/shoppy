<!DOCTYPE html>
<html>
<head>
  <title>My Orders - SHOPPY</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
    }

    header {
      background: green;
      color: white;
      padding: 10px;
      text-align: center;
    }

    .order {
      background: white;
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
    }

    .status {
      font-weight: bold;
    }

    .processing { color: orange; }
    .shipped { color: blue; }
    .delivered { color: green; }

    button {
      margin-top: 5px;
      padding: 8px;
      border: none;
      background: green;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h2>My Orders 📦</h2>
</header>

<div id="ordersList"></div>

<script>

async function loadOrders() {
  const res = await fetch("/orders");
  const orders = await res.json();

  const container = document.getElementById("ordersList");
  container.innerHTML = "";

  orders.forEach(order => {
    container.innerHTML += `
      <div class="order">
        <h3>${order.items?.length || 1} item(s)</h3>
        <p>Status: ${order.status}</p>
        <button onclick="alert('Tracking coming soon')">Track Order</button>
      </div>
    `;
  });
}

loadOrders();

</script>

</body>
</html>
