<!DOCTYPE html>
<html>
<head>
  <title>Product - SHOPPY</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    .container {
      padding: 10px;
    }

    img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
    }

    .price {
      color: green;
      font-size: 20px;
      font-weight: bold;
    }

    .buttons button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    .cart { background: orange; }
    .buy { background: green; }
    .wishlist { background: red; }

    .section {
      background: white;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
    }

    .review {
      border-top: 1px solid #ccc;
      padding: 5px 0;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- PRODUCT IMAGE -->
  <img src="https://via.placeholder.com/300" id="productImage">

  <!-- NAME -->
  <h2 id="productName">Sample Product</h2>

  <!-- PRICE -->
  <p class="price" id="productPrice">KSh 0</p>

  <!-- BUTTONS -->
  <div class="buttons">
    <button class="cart" onclick="addToCart()">🛒 Add to Cart</button>
    <button class="buy" onclick="buyNow()">⚡ Buy Now</button>
    <button class="wishlist" onclick="addToWishlist()">❤️ Wishlist</button>
  </div>

  <!-- DESCRIPTION -->
  <div class="section">
    <h3>Description</h3>
    <p id="productDesc">This is a great product.</p>
  </div>

  <!-- REVIEWS -->
  <div class="section">
    <h3>Reviews</h3>

    <div class="review">⭐ 5 - Very good product!</div>
    <div class="review">⭐ 4 - Works well</div>
    <div class="review">⭐ 3 - Average</div>
  </div>

</div>

<script>

// TEMP PRODUCT DATA (later from backend)
const product = {
  name: "Laptop",
  price: 45000,
  desc: "High performance laptop for work and school",
  image: "https://via.placeholder.com/300"
};

// LOAD PRODUCT
document.getElementById("productName").innerText = product.name;
document.getElementById("productPrice").innerText = "KSh " + product.price;
document.getElementById("productDesc").innerText = product.desc;
document.getElementById("productImage").src = product.image;

// BUTTON FUNCTIONS
function addToCart() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push({
    name: product.name,
    price: product.price,
    qty: 1
  });

  localStorage.setItem("cart", JSON.stringify(cart));

  alert("Added to cart 🛒");
}


function buyNow() {
  alert("Proceeding to checkout ⚡");
}
function addToWishlist() {
  let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

  wishlist.push({
    name: product.name,
    price: product.price
  });

  localStorage.setItem("wishlist", JSON.stringify(wishlist));

  alert("Saved to wishlist ❤️");
}

</script>

</body>
</html>
