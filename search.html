<!DOCTYPE html>
<html>
<head>
  <title>Search - SHOPPY</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: green;
      color: white;
      padding: 10px;
      text-align: center;
    }

    .search-bar {
      display: flex;
      padding: 10px;
      background: white;
    }

    input {
      flex: 1;
      padding: 10px;
    }

    button {
      padding: 10px;
      background: green;
      color: white;
      border: none;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: white;
    }

    select {
      padding: 5px;
    }

    .products {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 10px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 100px;
      object-fit: cover;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    .rating {
      color: orange;
    }
  </style>
</head>

<body>

<header>
  <h2>Search Results</h2>
</header>

<!-- SEARCH -->
<div class="search-bar">
  <input id="searchInput" placeholder="Search...">
  <button onclick="search()">Search</button>
</div>

<!-- FILTER + SORT -->
<div class="controls">
  <div>
    Filter:
    <select id="priceFilter">
      <option value="all">All</option>
      <option value="low">Below 500</option>
      <option value="mid">500 - 2000</option>
      <option value="high">Above 2000</option>
    </select>
  </div>

  <div>
    Sort:
    <select id="sortOption">
      <option value="default">Default</option>
      <option value="cheap">Cheapest</option>
      <option value="new">Newest</option>
    </select>
  </div>
</div>

<!-- PRODUCTS -->
<div class="products" id="productList"></div>

<script>

let products = [];

fetch("/products")
  .then(res => res.json())
  .then(data => {
    products = data;
    displayProducts(products);
  });

function displayProducts(list) {
  const container = document.getElementById("productList");
  container.innerHTML = "";

container.innerHTML += `
  <div class="card" onclick="openProduct('${p.name}')">

  list.forEach(p => {
container.innerHTML += `
  <div class="card" onclick="openProduct('${p.name}')">
        <img src="${p.image}">
        <h4>${p.name}</h4>
        <p class="price">KSh ${p.price}</p>
        <p class="rating">⭐ ${p.rating}</p>
      </div>
    `;
  });
}
function openProduct(name) {
  // For now just go to product page
  window.location.href = "/product.html";
}
function search() {
  let query = document.getElementById("searchInput").value.toLowerCase();
  let filtered = products.filter(p => p.name.toLowerCase().includes(query));

  applyFilterAndSort(filtered);
}

function applyFilterAndSort(list) {
  let filter = document.getElementById("priceFilter").value;
  let sort = document.getElementById("sortOption").value;

  // FILTER
  if (filter === "low") list = list.filter(p => p.price < 500);
  if (filter === "mid") list = list.filter(p => p.price >= 500 && p.price <= 2000);
  if (filter === "high") list = list.filter(p => p.price > 2000);

  // SORT
  if (sort === "cheap") list.sort((a,b) => a.price - b.price);
  if (sort === "new") list.reverse();

  displayProducts(list);
}

// initial load
displayProducts(products);

</script>

</body>
</html>
